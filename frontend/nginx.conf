# Nginx Configuration para BookHeaven Frontend
# Este archivo optimiza la entrega del frontend con compresión y caché

server {
    listen 3000;
    server_name _;

    # Compresión Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;
    gzip_disable "MSIE [1-6]\.";
    gzip_comp_level 6;

    # Brotli compression (mejor que gzip, si soporte en servidor)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript 
    #              application/x-javascript application/xml+rss 
    #              application/json application/javascript;

    # Directorio raíz del frontend
    root /app/dist;
    index index.html;

    # Evitar acceso a archivos sensibles
    location ~ /\. {
        deny all;
    }

    location ~ /node_modules/ {
        deny all;
    }

    # Assets estáticos con caché largo (hash en nombre = cambios = nuevo archivo)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Road-Cache "HIT from nginx";
        access_log off;
    }

    # Assets sin hash - revisar frecuentemente
    location ~* \.(html|json|manifest|webmanifest)$ {
        expires 10m;
        add_header Cache-Control "public, max-age=600";
        access_log off;
    }

    # Proxy a API backend
    location /api {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts para API
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Proxy a storage
    location /storage {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Cache para imágenes
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # SPA fallback - toda ruta que no sea existan va a index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=300";
    }

    # Headers de seguridad y performance
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Permitir CORS si es necesario
    # add_header Access-Control-Allow-Origin "*" always;
    # add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    # add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    
    # if ($request_method = 'OPTIONS') {
    #     return 204;
    # }
}
