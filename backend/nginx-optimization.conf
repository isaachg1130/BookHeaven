# OPTIMIZACIÓN: Configuración de Nginx para máximo rendimiento
# Agregar a tu bloque server en nginx.conf

# ================================
# GZIP COMPRESSION
# ================================
gzip on;
gzip_vary on;
gzip_min_length 1000;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/rss+xml
    application/atom+xml
    image/svg+xml
    application/vnd.js
    application/vnd.json
    text/x-component
    text/x-cross-domain-policy;

# Brotli compression (si está instalado)
brotli on;
brotli_comp_level 6;
brotli_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/rss+xml
    application/atom+xml
    image/svg+xml;

# ================================
# CACHE CONFIGURATION
# ================================

# Cache optimizado para imágenes de portadas (long-term caching)
location ~ ^/(storage|public/storage)/(images|media)/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    add_header X-Content-Type-Options "nosniff";
    add_header Vary "Accept-Encoding";
    
    # Habilitar sendfile para mejor performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Desactivar logs para mejor performance
    access_log off;
    
    # Comprimir imágenes SVG
    gzip_static on;
}

# Cache headers para assets versionados (long-term caching)
location ~ \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|eot|ttf|otf)-[a-f0-9]{8}\.[a-z0-9]+$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff";
    access_log off;
}

# Cache headers para assets normales e imágenes (medium-term caching)
location ~ \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|eot|ttf|otf|webp|avif)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header X-Content-Type-Options "nosniff";
    add_header Vary "Accept-Encoding";
    access_log off;
}

# Cache headers para API responses de contenido (short-term caching)
location ~ ^/api/content/(libros|mangas|comics)$ {
    # Cache pública por 5 minutos con revalidación
    add_header Cache-Control "public, max-age=300, stale-while-revalidate=300";
    add_header Vary "Accept-Encoding, Authorization";
    add_header X-Content-Type-Options "nosniff";
    
    # CORS headers si es necesario
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    
    try_files $uri @backend;
}

# Cache headers para API responses (solo lectura)
location ~ ^/api/(reviews|payments/plans)/ {
    # Cache pública por 1 hora
    add_header Cache-Control "public, max-age=3600";
    add_header Vary "Accept-Encoding";
    
    # Permite stale while revalidate para mejor UX
    add_header Cache-Control "public, max-age=1800, stale-while-revalidate=1800";
    
    # CORS headers si es necesario
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    
    try_files $uri @backend;
}

# No cachear rutas autenticadas
location ~ ^/api/(auth|dashboard|usuarios|mi-lista|pagos)/ {
    add_header Cache-Control "private, no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    
    try_files $uri @backend;
}

# Backend routing
location @backend {
    proxy_pass http://backend_server;
    proxy_http_version 1.1;
    
    # Headers de optimización
    proxy_set_header Connection "";
    proxy_set_header Cache-Control "public";
    proxy_set_header Vary "Accept-Encoding";
    
    # Timeouts optimizados
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 30s;
    
    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
}

# ================================
# STATIC FILES OPTIMIZATION
# ================================

location ~* \.(ico|txt)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000";
    access_log off;
}

# ================================
# PERFORMANCE HEADERS
# ================================

# HTTP/2 Push (opcional, si soporta)
add_header Link "</js/vendor-[hash].js>; rel=preload; as=script" always;

# Headers de seguridad (sin impacto en rendimiento)
add_header X-Frame-Options "SAMEORIGIN";
add_header X-Content-Type-Options "nosniff";
add_header X-XSS-Protection "1; mode=block";
add_header Referrer-Policy "strict-origin-when-cross-origin";

# ================================
# COMPRESSION NEGOTIATION
# ================================

# Servir .gz si el cliente soporta gzip
location ~ ^(.+)\.gz$ {
    add_header Content-Type "application/gzip";
    add_header Content-Encoding "gzip";
    add_header Vary "Accept-Encoding";
    rewrite ^(.+)\.gz$ $1 break;
}

# Servir .br si el cliente soporta brotli
location ~ ^(.+)\.br$ {
    add_header Content-Type "application/brotli";
    add_header Content-Encoding "br";
    add_header Vary "Accept-Encoding";
    rewrite ^(.+)\.br$ $1 break;
}

# ================================
# PERFORMANCE TUNING
# ================================

# Keep-alive connections
keepalive_timeout 65;
keepalive_requests 100;

# TCP Optimization
tcp_nopush on;
tcp_nodelay on;

# Buffer optimization
client_max_body_size 100m;

# Disable unnecessary logging de static files
map $request_uri $loggable {
    ~*\.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|eot|ttf|otf|ico)$ 0;
    default 1;
}

access_log /var/log/nginx/access.log if=$loggable;

# ================================
# UPSTREAM OPTIMIZATION
# ================================

# Upstream backend con balanceo (si tienes múltiples servidores)
upstream backend_server {
    server localhost:8000 max_fails=3 fail_timeout=30s;
    # server 192.168.1.100:8000 backup;
    keepalive 32;
}

# ================================
# REQUEST OPTIMIZATION
# ================================

# Disable request body size para imágenes grandes
client_body_buffer_size 10M;

# Timeouts optimizados
client_header_timeout 10s;
client_body_timeout 10s;
send_timeout 10s;
